<script src="../assets/main.js"></script>
<script>
  fetch("posts/index.json")
    .then(r => r.json())
    .then(posts => {
      const c = document.getElementById("post-list");
      c.innerHTML = "";
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));
      posts.forEach(p => {
        const row = document.createElement("a");
        row.href = p.url ? p.url : `post.html?slug=${p.slug}`;
        row.className = "post-row reveal";
        row.dataset.tags = p.tags.join(",");
        row.innerHTML = `
          <div class="post-row__date">${new Date(p.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</div>
          <div>
            <h3 class="post-row__title">${p.title}</h3>
            <p class="post-row__excerpt">${p.excerpt}</p>
          </div>
          <div class="post-row__tags">${p.tags.map(t => `<span class="chip">${t}</span>`).join("")}</div>
        `;
        c.appendChild(row);
      });
      document.querySelectorAll(".reveal:not(.in)").forEach(el => {
        const io = new IntersectionObserver((es, ob) => { es.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); ob.unobserve(e.target); } }); });
        io.observe(el);
      });
      setupFilters("#blog-filters", "#post-list .post-row");
    })
    .catch(() => {
      document.getElementById("post-list").innerHTML = '<p style="color:var(--ink-3)">Could not load posts. If you opened this file directly, run a local server (see README).</p>';
    });
</script>
