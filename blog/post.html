<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script>
  (async function () {
    const slug = new URLSearchParams(location.search).get("slug");
    const el = document.getElementById("post");
    if (!slug) {
      el.innerHTML = "<h1>Post not found</h1><p>No slug provided in the URL.</p>";
      return;
    }
    try {
      const indexRes = await fetch("posts/index.json");
      const index = await indexRes.json();
      const meta = index.find(p => p.slug === slug);
      if (!meta) throw new Error("Post not in index");

      const mdRes = await fetch(`posts/${slug}.md`);
      if (!mdRes.ok) throw new Error("Markdown not found");
      const md = await mdRes.text();

      document.title = `${meta.title} · Tim Maxwell`;

      const header = `
        <h1>${meta.title}</h1>
        <p class="post-meta">
          ${new Date(meta.date).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}
          <span class="post-meta__tags">${meta.tags.map(t => `<span class="chip">${t}</span>`).join("")}</span>
        </p>
      `;
      el.innerHTML = header + marked.parse(md);
      el.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
    } catch (err) {
      el.innerHTML = `<h1>Couldn't load post</h1><p style="color:var(--ink-3)">${err.message}. If you opened the file directly in a browser, run a local server (see README).</p>`;
    }
  })();
</script>
