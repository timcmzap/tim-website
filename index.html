<section class="section" id="agile-compare">
  <div class="container">
    <div class="section__header">
      <div>
        <div class="eyebrow">Live tool</div>
        <h2>Agile Compare</h2>
      </div>
      <a href="https://agilecompare.com/" class="section__link" target="_blank" rel="noopener">Open in a new tab →</a>
    </div>
    <p class="lead reveal" style="margin-bottom: 32px;">A web app I built to compare your Octopus Agile tariff against other market tariffs — using your own live consumption pulled from the Octopus API.</p>
    <div class="reveal" style="border: 1px solid var(--line); border-radius: var(--radius-md); overflow: hidden; background: var(--surface); box-shadow: var(--shadow-md);">
      <iframe
        src="https://agilecompare.com/"
        title="Agile Compare — compare your Octopus Agile tariff against the market"
        loading="lazy"
        style="display: block; width: 100%; height: 720px; border: 0;"
        allow="clipboard-write">
      </iframe>
    </div>
    <p style="text-align: center; color: var(--ink-3); font-size: 0.88rem; margin-top: 16px;">
      Not loading? <a href="https://agilecompare.com/" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: underline;">Open Agile Compare directly →</a>
    </p>
  </div>
</section>
